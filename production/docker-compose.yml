version: '3.8'

services:
  drone-detector:
    build: .
    container_name: drone-detection
    restart: unless-stopped
    ports:
      - "8080:8080"
    devices:
      - /dev/bus/usb:/dev/bus/usb  # For RTL-SDR access
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - CENTER_FREQ=2437000000
      - GAIN=40
      - THRESHOLD=0.7
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Nginx reverse proxy for production
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf
  #   depends_on:
  #     - drone-detector

volumes:
  logs:
  config:
